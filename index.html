<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Script Generator — Partner Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">S</div>
      <span>SalesGen AI</span>
    </div>
    <nav>
      <a class="nav-item active" href="#">สร้างสคริปต์</a>
    </nav>
    <div class="sidebar-footer">
      <p>Partner Tool v1.0</p>
    </div>
  </div>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>Sales Script Generator</h1>
        <p>สร้างสคริปต์ขายที่เน้น Pain Point สำหรับแต่ละอุตสาหกรรม</p>
      </div>
      <span class="provider-badge" id="provider-badge">กำลังโหลด...</span>
    </div>

    <div class="content">
      <!-- LEFT: Form -->
      <section class="form-panel">

        <div class="field">
          <label>อุตสาหกรรมของลูกค้า <span class="req">*</span></label>
          <input type="text" id="industry" placeholder="เช่น โรงแรม, โรงงาน, โรงพยาบาล..." />
          <div class="tags">
            <button class="tag" onclick="setIndustry(this, 'โรงแรม / Hospitality')">🏨 โรงแรม</button>
            <button class="tag" onclick="setIndustry(this, 'โรงงาน / Manufacturing')">🏭 โรงงาน</button>
            <button class="tag" onclick="setIndustry(this, 'โรงพยาบาล / Healthcare')">🏥 โรงพยาบาล</button>
            <button class="tag" onclick="setIndustry(this, 'ร้านอาหาร / F&B')">🍜 ร้านอาหาร</button>
            <button class="tag" onclick="setIndustry(this, 'ธนาคาร / FinTech')">🏦 ธนาคาร</button>
            <button class="tag" onclick="setIndustry(this, 'ค้าปลีก / Retail')">🛒 ค้าปลีก</button>
            <button class="tag" onclick="setIndustry(this, 'อสังหาริมทรัพย์')">🏢 อสังหาฯ</button>
            <button class="tag" onclick="setIndustry(this, 'โลจิสติกส์ / Logistics')">🚚 โลจิสติกส์</button>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>สินค้าที่นำเสนอ</label>
            <select id="product">
              <option value="VoIP">VoIP — ระบบโทรศัพท์อินเทอร์เน็ต</option>
              <option value="SIP Trunk">SIP Trunk — สายโทรศัพท์ Virtual</option>
              <option value="OrderJini">OrderJini — ระบบรับออเดอร์ AI</option>
              <option value="VoIP+SIP Trunk">VoIP + SIP Trunk (แพ็กเกจรวม)</option>
            </select>
          </div>
          <div class="field">
            <label>ขนาดธุรกิจ</label>
            <select id="bizsize">
              <option>SME (10–50 คน)</option>
              <option>กลาง (50–200 คน)</option>
              <option>ใหญ่ (200+ คน)</option>
              <option>Enterprise</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>รูปแบบเนื้อหา</label>
          <div class="type-tabs">
            <button class="type-tab active" onclick="setType(this,'email')">📧 อีเมลนำเสนอ</button>
            <button class="type-tab" onclick="setType(this,'script')">📞 สคริปต์โทรศัพท์</button>
            <button class="type-tab" onclick="setType(this,'line')">💬 Line / LinkedIn</button>
            <button class="type-tab" onclick="setType(this,'proposal')">📄 ย่อหน้า Proposal</button>
          </div>
        </div>

        <div class="field">
          <label>ข้อมูลเพิ่มเติม <span class="opt">(ไม่บังคับ)</span></label>
          <textarea id="extra" rows="3" placeholder="เช่น ชื่อบริษัทลูกค้า, pain point ที่ทราบอยู่แล้ว, จำนวนสาขา..."></textarea>
        </div>

        <button class="gen-btn" id="gen-btn" onclick="generate()">
          <span id="btn-text">✨ สร้างเนื้อหาขาย</span>
        </button>
        <p class="status" id="status"></p>
      </section>

      <!-- RIGHT: Result -->
      <section class="result-panel">
        <div class="result-header">
          <span>ผลลัพธ์</span>
          <div class="result-actions" id="result-actions" style="display:none">
            <button onclick="copyResult()">คัดลอก</button>
            <button onclick="generate()">สร้างใหม่</button>
          </div>
        </div>
        <div class="result-box" id="result-box">
          <div class="placeholder">
            <div class="placeholder-icon">✦</div>
            <p>กรอกข้อมูลทางซ้ายแล้วกด "สร้างเนื้อหาขาย"<br/>AI จะเขียนสคริปต์ที่เน้น Pain Point ของอุตสาหกรรมนั้นให้ทันที</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
